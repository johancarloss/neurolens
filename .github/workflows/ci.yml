name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push happens
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen from uv.lock)
        run: uv sync --frozen --extra dev

      - name: Lint with ruff (check)
        run: uv run ruff check .

      - name: Lint with ruff (format check)
        run: uv run ruff format --check .

      - name: Run tests
        # Integration tests that need DATABASE_URL + WANDB_API_KEY are auto-skipped
        # via pytest.mark.skipif when env vars are empty.
        run: uv run pytest tests/ -v --tb=short
        env:
          DATABASE_URL: ""
          WANDB_API_KEY: ""
