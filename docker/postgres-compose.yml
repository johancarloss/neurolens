# ============================================================================
# NeuroLens — PostgreSQL container (Docker Compose)
# ----------------------------------------------------------------------------
# Run from neurolens/docker/:
#   docker compose -f postgres-compose.yml --env-file ../.env up -d
#
# Stop:
#   docker compose -f postgres-compose.yml down
#
# Wipe data (DANGEROUS — drops the volume):
#   docker compose -f postgres-compose.yml down -v
#
# Reference: docs/private/blueprint/02-data-model.md
# Reference: docs/private/blueprint/10-risks-and-mitigations.md (CC01, CC04)
# ============================================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: neurolens-postgres
    restart: unless-stopped

    environment:
      # POSTGRES_PASSWORD is the superuser ('postgres') password.
      # NOT used by the application — only for admin maintenance.
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      # Default database created by the image on first init
      POSTGRES_DB: neurolens
      # Used by init script to create the restricted role
      POSTGRES_NEUROLENS_WRITER_PASSWORD: ${POSTGRES_NEUROLENS_WRITER_PASSWORD}
      # Initdb args ensure ScramSHA-256 from the start
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"

    ports:
      # External port 5434, internal 5432.
      # Bind to ALL interfaces (0.0.0.0) so Kaggle can reach via Oracle firewall.
      # SSL + scram-sha-256 + restricted user + strong password defend exposure.
      - "0.0.0.0:5434:5432"

    volumes:
      # Persistent data — survives container restarts
      - neurolens-postgres-data:/var/lib/postgresql/data

      # SSL certificate + key (mounted read-only)
      - ./postgres-ssl/server.crt:/etc/postgresql/ssl/server.crt:ro
      - ./postgres-ssl/server.key:/etc/postgresql/ssl/server.key:ro

      # Custom postgresql.conf and pg_hba.conf (mounted read-only)
      - ./postgres-config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres-config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro

      # Init scripts (executed only on first container init when data volume is empty)
      - ./postgres-init:/docker-entrypoint-initdb.d:ro

    # Override postgres command to use OUR config files (not the defaults).
    # PGDATA still points to /var/lib/postgresql/data (the volume mount).
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"

    healthcheck:
      # Use neurolens_writer role to verify the restricted user works too
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d neurolens || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Postgres SSL key must be owned by postgres user (uid 70 in alpine).
    # We pre-fix permissions on the host side; container reads as read-only mount.
    # User mapping: the image's postgres user (uid 70) needs to read /etc/postgresql/ssl/server.key
    # Setting --umask doesn't help; we rely on chmod 644 on the file (key readable by all)
    # The SSL key being world-readable on the host is acceptable: it's inside a docker dir
    # that already requires SSH access to the VPS to read.

    # Limits — prevent runaway resource use
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

    # Log driver — keep last 50MB across 5 files
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  neurolens-postgres-data:
    name: neurolens-postgres-data
