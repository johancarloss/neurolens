# ============================================================================
# NeuroLens — PostgreSQL Host-Based Authentication
# ----------------------------------------------------------------------------
# Format: TYPE  DATABASE        USER            ADDRESS                 METHOD
#
# Rules (top to bottom, first match wins):
# 1. Local connections (inside container) use scram-sha-256 — no trust
# 2. Internet connections REQUIRE SSL (hostssl) + scram-sha-256
# 3. Non-SSL connections from network are REJECTED (hostnossl reject)
# ============================================================================

# Local socket connections (only useful inside container)
local   all             all                                     scram-sha-256

# IPv4 loopback (for healthchecks inside container)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# REJECT any non-SSL connection from external networks (defense-in-depth)
hostnossl  all          all             0.0.0.0/0               reject
hostnossl  all          all             ::/0                    reject

# Allow SSL connections to neurolens DB from anywhere (scram auth required)
hostssl    neurolens    neurolens_writer  0.0.0.0/0             scram-sha-256
hostssl    neurolens    neurolens_writer  ::/0                  scram-sha-256

# REJECT any other database access from network (only neurolens DB exposed)
host       all          all             0.0.0.0/0               reject
host       all          all             ::/0                    reject
