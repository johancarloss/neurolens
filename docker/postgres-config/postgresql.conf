# ============================================================================
# NeuroLens — PostgreSQL configuration
# ----------------------------------------------------------------------------
# Hardened for internet-exposed Postgres with SSL, ScramSHA-256, and DoS limits.
# Reference: docs/private/blueprint/10-risks-and-mitigations.md (CC01)
# ============================================================================

# --- CONNECTIONS AND AUTHENTICATION -----------------------------------------
listen_addresses = '*'           # bind on all interfaces inside the container
                                 # (Docker port mapping controls external exposure)
port = 5432                      # internal port; external port is 5434 via Docker

max_connections = 20             # hard cap; prevents resource exhaustion DoS
superuser_reserved_connections = 3

# --- AUTHENTICATION ----------------------------------------------------------
password_encryption = 'scram-sha-256'   # stronger than MD5; resistant to rainbow tables
authentication_timeout = 10s            # disconnect on slow auth (slows brute force)

# --- SSL / TLS --------------------------------------------------------------
ssl = on
ssl_cert_file = '/etc/postgresql/ssl/server.crt'
ssl_key_file = '/etc/postgresql/ssl/server.key'
ssl_prefer_server_ciphers = on
# Allow modern TLS only
ssl_min_protocol_version = 'TLSv1.2'
ssl_max_protocol_version = 'TLSv1.3'

# --- RESOURCE LIMITS (DoS prevention) ---------------------------------------
statement_timeout = 60s          # any query > 60s is killed
idle_in_transaction_session_timeout = 5min   # idle transactions release locks
lock_timeout = 10s               # cancel waiting after 10s on lock

# --- LOGGING (audit trail) --------------------------------------------------
log_destination = 'stderr'       # captured by Docker
logging_collector = off
log_min_duration_statement = 1000ms   # log slow queries (>1s)
log_connections = on             # log every successful auth
log_disconnections = on
log_hostname = off               # avoid reverse DNS overhead
log_line_prefix = '%t [%p]: db=%d,user=%u,host=%h,app=%a '
log_statement = 'ddl'            # log DDL (audit schema changes)

# --- PERFORMANCE (modest defaults for ~50-200 runs/month workload) ----------
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 64MB
checkpoint_completion_target = 0.9

# --- WAL --------------------------------------------------------------------
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
