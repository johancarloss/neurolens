# NeuroLens — Active run selector
# ----------------------------------------------------------------------------
# This file is the SOURCE OF TRUTH for what the Kaggle kernel will execute
# on the next "Save & Run All". The runner kernel clones the repo and reads
# THIS file to decide which job and which config profile to load.
#
# Workflow to switch modes:
#   1. Edit this file (job_type + config_profile)
#   2. git push
#   3. In Kaggle UI: Save Version -> Save & Run All
# That's it. No CLI push, no UI variable juggling.

# Which entry point to invoke (see JOB_TYPES registry in kernel/runner/run.py):
#   - train     : arch-agnostic training (VGG16 | ResNet50, chosen by config.arch)
#   - xai_batch : Grad-CAM + LIME + SHAP batch over selected images
job_type: xai_batch

# Which config profile to load:
#   train jobs    -> configs/{profile}_stage{1,2}.yaml
#     smoke_micro / smoke_small / vgg16 / resnet50_smoke / resnet50
#   xai_batch     -> configs/{profile}.yaml
#     xai_smoke   : 1 arch, 2 images, tiny budgets. <2 min. USE FIRST.
#     xai_default : both archs, 40 images, full LIME/SHAP budgets. PRODUCTION.
config_profile: xai_smoke
