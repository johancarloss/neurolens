# NeuroLens — Active run selector
# ----------------------------------------------------------------------------
# This file is the SOURCE OF TRUTH for what the Kaggle kernel will execute
# on the next "Save & Run All". The runner kernel clones the repo and reads
# THIS file to decide which job and which config profile to load.
#
# Workflow to switch modes:
#   1. Edit this file (job_type + config_profile)
#   2. git push
#   3. In Kaggle UI: Save Version -> Save & Run All
# That's it. No CLI push, no UI variable juggling.

# Which entry point to invoke (see JOB_TYPES registry in kernel/runner/run.py).
# Since Phase 2 the runner is arch-agnostic (it reads `arch` from the config
# profile), so this stays `train_vgg16` for ANY architecture — it is now just
# the label the immutable kernel maps to the generalized runner.
job_type: train_vgg16

# Which config pair to load (resolves to configs/{profile}_stage{1,2}.yaml)
# Available profiles:
#   - smoke_micro    : VGG16, 1 fold, 1 epoch, 50/20 samples/class. <2 min.
#   - smoke_small    : VGG16, 1 fold, 2 epochs, full dataset.
#   - vgg16          : VGG16, 5 folds, 50 epochs each stage. PRODUCTION.
#   - resnet50_smoke : ResNet50, 1 fold, 1 epoch, 50/20 samples/class. <2 min.
#   - resnet50       : ResNet50, 5 folds, 50 epochs each stage. PRODUCTION.
config_profile: resnet50_smoke
