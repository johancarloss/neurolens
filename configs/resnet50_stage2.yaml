# NeuroLens — ResNet50 stage 2 (fine-tune layer4 + head)
#
# Same hyperparameters as VGG16 stage 2. Stage 2: layer4 (last bottleneck
# block) + custom head trainable; LR drops 10x.

arch: resnet50
stage: 2

# Optimization
lr: 0.0001          # 10x lower than stage 1 (matches VGG16 stage 2)
batch_size: 32
epochs: 50
optimizer: adam
loss: cross_entropy

# Augmentation (same as stage 1)
augmentation:
  shear_range: 0.2
  zoom_range: 0.2
  horizontal_flip: true

# Data
image_size: 224
num_workers: 4

# Head
dropout: 0.5

# Reproducibility — SAME seed as VGG16 -> identical folds -> fair comparison
seed: 42

# Cross-validation (same as stage 1)
cv_folds: 5
target_fold: null

# Early stopping
early_stopping_patience: null
save_best_only: true
