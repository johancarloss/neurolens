# NeuroLens — XAI batch generation (production)
#
# Runs Grad-CAM + LIME + SHAP on the SAME selected images for BOTH architectures,
# so we can compare where each model looks. Image selection targets the Phase 2
# finding (glioma, especially glioma->notumor). Checkpoint paths point to the
# Kaggle Dataset of trained .pt files (see Phase 3 plan, Bloco 0).

# Explain with each architecture (fold 0 of each). run_id is that fold's
# prediction run — it links each XAI artifact to the matching prediction.
archs:
  - name: vgg16
    checkpoint: /kaggle/input/neurolens-checkpoints/vgg16_fold0_final.pt
    run_id: 14
  - name: resnet50
    checkpoint: /kaggle/input/neurolens-checkpoints/resnet50_fold0_final.pt
    run_id: 26

# Draw the image selection from the SAME folds we explain (fold 0 of each arch),
# so the selection reason matches the checkpoint we run XAI with.
selection_run_ids: [14, 26]
num_images: 40

# LIME (slow — scales with num_samples; stability runs multiply cost)
lime_num_samples: 1000
lime_segments_n: 100
lime_stability_runs: 5

# SHAP (GradientExplainer)
shap_nsamples: 200
shap_num_background: 50

# Metrics
binarization_threshold: 0.5

# Output
output_dir: /kaggle/working/xai
