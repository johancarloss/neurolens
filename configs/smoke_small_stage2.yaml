# NeuroLens — SMOKE SMALL (stage 2)
# See smoke_small_stage1.yaml header for context.

arch: vgg16
stage: 2

lr: 0.0001
batch_size: 32
epochs: 2
optimizer: adam
loss: cross_entropy

augmentation:
  shear_range: 0.2
  zoom_range: 0.2
  horizontal_flip: true

image_size: 224
num_workers: 4
dropout: 0.5
seed: 42

cv_folds: 5
target_fold: 0

train_samples_per_class: null
test_samples_per_class: null

early_stopping_patience: null
save_best_only: true
