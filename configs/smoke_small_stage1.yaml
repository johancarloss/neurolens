# NeuroLens — SMOKE SMALL (stage 1)
#
# Medium-fidelity smoke: 1 fold, 2 epochs, FULL dataset (no sample caps).
# Used AFTER smoke_micro passes. Measures real per-epoch wall-clock time
# on the actual data scale, so we can extrapolate the cost of 50 epochs.

arch: vgg16
stage: 1

lr: 0.001
batch_size: 32
epochs: 2
optimizer: adam
loss: cross_entropy

augmentation:
  shear_range: 0.2
  zoom_range: 0.2
  horizontal_flip: true

image_size: 224
num_workers: 4
dropout: 0.5
seed: 42

cv_folds: 5
target_fold: 0  # only fold 0 in smoke_small

# No sample caps — full dataset
train_samples_per_class: null
test_samples_per_class: null

early_stopping_patience: null
save_best_only: true
